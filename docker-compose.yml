version: '3.8'
services:
  database:
    image: mysql:8.0
    container_name: cbtpro_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: cbtpro_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cbtpro_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbtpro_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-root}@database:3306/cbtpro_db
      - JWT_SECRET=${JWT_SECRET:-super_secret_docker_key}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - cbtpro_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cbtpro_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - cbtpro_network

volumes:
  mysql_data:

networks:
  cbtpro_network:
    driver: bridge
